<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Privacy Policy</title>
  <script>
    // ブラウザの言語を取得
    const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();

    // 日本語なら ja.html、その他は en.html にリダイレクト
    if (lang.startsWith('ja')) {
      window.location.href = './geomemo_privacy_ja.html.html';
    } else {
      window.location.href = './geomemo_privacy_en.html.html';
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
