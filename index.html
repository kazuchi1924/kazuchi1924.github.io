<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazuchiapps</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            line-height: 1.6; 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .titlewrapper {
            text-align: center;
            margin-bottom: 50px;
        }

        .title { 
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--text-main);
            margin: 0;
        }

        .app-grid {
            display: grid;
            gap: 20px;
        }

        .app-card { 
            background: var(--card-bg);
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .app-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .app-title { 
            font-weight: bold; 
            font-size: 1.4em; 
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-description {
            color: var(--text-sub);
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .link-group {
            display: flex;
            gap: 15px;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }

        a { 
            color: var(--primary-color); 
            text-decoration: none; 
            font-size: 0.9rem;
            font-weight: 600;
        }

        a:hover { 
            text-decoration: underline; 
        }

        hr { border: 0; border-top: 1px solid #e2e8f0; margin: 40px 0; }

        footer { 
            text-align: center;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        /* スマホ対応 */
        @media (max-width: 480px) {
            .title { font-size: 2rem; }
            body { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class='titlewrapper'>
        <h1 class="title">Kazuchiapps</h1>
    </div>

    <div class="app-grid">
        <div class="app-card">
            <div class="app-title">📍 GeoMemo</div>
            <p class="app-description">位置情報を活用した自分だけの備忘録アプリ。大切な場所の記憶をスマートに管理します。</p>
            <div class="store-badge">
                <a href="https://play.google.com/store/apps/details?id=jp.kazuchiapp.geomemo">
                <img alt="Google Play で手に入れよう" 
                    src="https://play.google.com/intl/en_us/badges/static/images/badges/ja_badge_web_generic.png"
                    style="width: 160px;">
                </a>
            </div>
            <div class="link-group">
                <a href="./docs/geomemo_privacy.html">プライバシーポリシー</a>
            </div>
        </div>

        <div class="app-card">
            <div class="app-title">🧺 洗濯AIガイド</div>
            <p class="app-description">AIが洗濯タグを瞬時に解析。大切な衣類を守るための最適な洗濯方法を提案します。</p>
            <div class="store-badge">
                <a href="https://play.google.com/store/apps/details?id=jp.kazuchiapps.laundry_ai_app">
                <img alt="Google Play で手に入れよう" 
                    src="https://play.google.com/intl/en_us/badges/static/images/badges/ja_badge_web_generic.png"
                    style="width: 160px;">
                </a>
            </div>
            <div class="link-group">
                <a href="./docs/laundry-privacy.html">プライバシーポリシー</a>
            </div>
        </div>
    </div>

    <hr>
    <footer>
        <p>&copy; 2026 Kazuchiapps</p>
        <p><small><a href="./app-ads.txt">app-ads.txt</a></small></p>
    </footer>
</body>
</html>
